name: Deploy Site & Admin

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/site-astro/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
  schedule:
    - cron: '3 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: 'https://alumni-book-api.chenyuhao2263.workers.dev'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build site (Astro SSG)
        run: pnpm --filter site-astro build

      - name: Build admin
        run: pnpm --filter admin build

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp -r packages/site-astro/dist/* deploy/
          mkdir -p deploy/admin
          cp -r packages/admin/dist/* deploy/admin/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
